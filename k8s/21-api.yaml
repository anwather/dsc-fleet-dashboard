---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dsc-fleet
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dsc-fleet
  labels:
    app: api
spec:
  # Single replica: the in-process scheduler must be a singleton.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: dsc-fleet-dashboard-api:dev
          # When loading via `eval $(minikube docker-env)` + `docker build`,
          # the image lives in the cluster docker daemon. Never IfNotPresent
          # accidentally pulling from a registry.
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: postgres-credentials # provides DATABASE_URL
            - secretRef:
                name: azure-credentials
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
