# Edit these values before applying. For production, generate a strong password
# (e.g. `openssl rand -base64 24`) and consider sealed-secrets / external-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: dsc-fleet
type: Opaque
stringData:
  POSTGRES_USER: dscfleet
  POSTGRES_PASSWORD: dscfleet
  POSTGRES_DB: dscfleet
  # Used by the api pod. Host must match the postgres Service name.
  DATABASE_URL: postgresql://dscfleet:dscfleet@postgres:5432/dscfleet?schema=public
