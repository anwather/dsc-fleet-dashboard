# Optional: nicer hostname access. Enable with `minikube addons enable ingress`,
# then add `127.0.0.1 dsc-fleet.local` to your hosts file (Windows:
# C:\Windows\System32\drivers\etc\hosts) and run `minikube tunnel` in a
# separate elevated shell. If you don't want this, just skip this file and use
# the NodePort exposed by the web Service.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsc-fleet
  namespace: dsc-fleet
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: dsc-fleet.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
