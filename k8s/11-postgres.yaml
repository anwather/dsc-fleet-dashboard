# Postgres as a StatefulSet with a PVC backed by minikube's default `standard`
# StorageClass. Data persists across `minikube stop` / `minikube start` and
# host reboots. It is destroyed by `minikube delete` (take a pg_dump first).
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dsc-fleet
  labels:
    app: postgres
spec:
  clusterIP: None # headless: stable DNS for the StatefulSet pod
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dsc-fleet
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999 # postgres uid in the official image
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: postgres-credentials
          # PGDATA must be a subdirectory of the mount, otherwise the
          # `lost+found` entry on some volumes breaks initdb.
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dscfleet", "-d", "dscfleet"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "dscfleet", "-d", "dscfleet"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        # `standard` is the minikube built-in hostpath StorageClass.
        # On other clusters change this (or remove for cluster default).
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
