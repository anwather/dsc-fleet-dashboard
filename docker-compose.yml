name: dsc-fleet-dashboard

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dscfleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dscfleet}
      POSTGRES_DB: ${POSTGRES_DB:-dscfleet}
    volumes:
      - dsc_fleet_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dscfleet} -d ${POSTGRES_DB:-dscfleet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dscfleet:dscfleet@postgres:5432/dscfleet?schema=public}
      API_PORT: ${API_PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AGENT_POLL_DEFAULT_SECONDS: ${AGENT_POLL_DEFAULT_SECONDS:-60}
      OFFLINE_MULTIPLIER: ${OFFLINE_MULTIPLIER:-3}
      DEFAULT_ASSIGNMENT_INTERVAL_MINUTES: ${DEFAULT_ASSIGNMENT_INTERVAL_MINUTES:-15}
      AZURE_RUNCOMMAND_TIMEOUT_MINUTES: ${AZURE_RUNCOMMAND_TIMEOUT_MINUTES:-30}
      REMOVAL_ACK_TIMEOUT_MINUTES: ${REMOVAL_ACK_TIMEOUT_MINUTES:-60}
      DSC_CONFIG_SCHEMA_URL: ${DSC_CONFIG_SCHEMA_URL:-https://aka.ms/dsc/schemas/v3/bundled/config/document.json}
    ports:
      - "${API_PORT:-3000}:3000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  dsc_fleet_pgdata:
    name: dsc_fleet_pgdata
